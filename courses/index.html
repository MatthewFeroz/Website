<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses | Matt Feroz</title>
    <meta name="description" content="Video courses to learn how AI really works." />
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .courses-wrap { max-width: 1100px; margin: 0 auto; padding: 7rem 1.5rem 4rem; }
        .courses-head { text-align:center; margin-bottom:2.5rem; }
        .courses-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:1.5rem; }
        .course-card { background:#1e1e21; border:1px solid #2a2a2e; border-radius:14px; overflow:hidden; text-decoration:none; color:inherit; display:flex; flex-direction:column; transition:transform .15s, border-color .15s; }
        .course-card:hover { transform:translateY(-3px); border-color:#f85f00; }
        .course-thumb { aspect-ratio:16/9; background:#141416 center/cover no-repeat; display:flex; align-items:center; justify-content:center; color:#3a3a40; font-size:2rem; }
        .course-body { padding:1.1rem 1.2rem 1.3rem; flex:1; display:flex; flex-direction:column; }
        .course-body h3 { margin:0 0 .4rem; font-size:1.15rem; }
        .course-body p { color:#9aa0aa; font-size:.9rem; margin:0 0 1rem; flex:1; }
        .course-meta { display:flex; gap:1rem; color:#cbd5e1; font-size:.82rem; }
        .progress-track { height:6px; background:#141416; border-radius:6px; overflow:hidden; margin-top:.8rem; }
        .progress-fill { height:100%; background:#f85f00; }
        .access-banner { background:#241a12; border:1px solid #f85f00; border-radius:12px; padding:1.1rem 1.4rem; margin-bottom:2rem; display:flex; justify-content:space-between; align-items:center; gap:1rem; flex-wrap:wrap; }
        .access-banner a { background:#f85f00; color:#fff; padding:.6rem 1.3rem; border-radius:8px; text-decoration:none; font-weight:600; white-space:nowrap; }
        .nav-auth-slot { display:flex; align-items:center; }
        .auth-signin-btn { background:#f85f00; color:#fff; border:none; border-radius:8px; padding:.5rem 1.1rem; font-weight:600; cursor:pointer; font-family:inherit; }
        .center-note { text-align:center; color:#9aa0aa; padding:3rem 0; }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="nav-inner">
            <a href="/" class="nav-logo"><span class="logo-full">MATT FEROZ</span><span class="logo-short">FEROZ</span></a>
            <button class="nav-toggle" aria-label="Open menu" aria-expanded="false" aria-controls="mobile-menu">☰</button>
            <nav class="nav-menu">
                <a href="/events/" class="nav-link">Events</a>
                <a href="/coaching/" class="nav-link">Coaching</a>
                <a href="/courses/" class="nav-link">Courses</a>
                <a href="https://www.youtube.com/@MattFeroz" target="_blank" class="nav-link">YouTube</a>
                <a href="/newsletter/" class="nav-link">Newsletter</a>
            </nav>
            <div class="nav-auth-slot" id="nav-auth"></div>
        </div>
        <div id="mobile-menu" class="mobile-menu" hidden>
            <button class="mobile-close" aria-label="Close menu">✕</button>
            <a href="/events/" class="mobile-link">Events</a>
            <a href="/coaching/" class="mobile-link">Coaching</a>
            <a href="/courses/" class="mobile-link">Courses</a>
            <a href="https://www.youtube.com/@MattFeroz" target="_blank" class="mobile-link">YouTube</a>
            <a href="/newsletter/" class="mobile-link">Newsletter</a>
            <a href="/account/" class="mobile-link">Account</a>
        </div>
    </header>

    <div class="courses-wrap">
        <div class="courses-head">
            <h1>Courses</h1>
            <p class="center-note" style="padding:.5rem 0 0;">Learn how AI really works — at your own pace.</p>
        </div>

        <div id="access-banner" class="access-banner" hidden>
            <span>You're signed in but don't have course access yet.</span>
            <a href="/platform/">Get access →</a>
        </div>

        <div id="grid" class="courses-grid"></div>
        <div id="empty" class="center-note" hidden>No courses published yet. Check back soon!</div>
        <div id="loading" class="center-note">Loading courses…</div>
    </div>

    <script src="/main.js" defer></script>
    <script type="module">
        import { getClerk, getConvexClient, api, mountAuthControls } from "/auth.js";

        const $ = (id) => document.getElementById(id);
        const fmtDur = (s) => { const m = Math.round(s / 60); return m < 60 ? m + " min" : Math.floor(m/60) + "h " + (m%60) + "m"; };

        (async () => {
            await mountAuthControls("#nav-auth");
            const client = await getConvexClient();
            let data;
            try { data = await client.query(api.courses.getActiveCourses, {}); }
            catch (e) { $("loading").textContent = "Could not load courses."; console.error(e); return; }

            $("loading").hidden = true;
            if (data.signedIn && !data.hasAccess) $("access-banner").hidden = false;

            if (!data.courses.length) { $("empty").hidden = false; return; }

            const grid = $("grid");
            for (const c of data.courses) {
                const a = document.createElement("a");
                a.className = "course-card";
                a.href = "/courses/course.html?slug=" + encodeURIComponent(c.slug);
                const thumb = c.thumbnailUrl
                    ? '<div class="course-thumb" style="background-image:url(' + JSON.stringify(c.thumbnailUrl) + ')"></div>'
                    : '<div class="course-thumb"><i class="fa-solid fa-play"></i></div>';
                a.innerHTML = thumb +
                    '<div class="course-body"><h3>' + c.title + '</h3>' +
                    '<p>' + (c.description || "") + '</p>' +
                    '<div class="course-meta"><span><i class="fa-regular fa-rectangle-list"></i> ' + c.lessonCount + ' lessons</span>' +
                    '<span><i class="fa-regular fa-clock"></i> ' + fmtDur(c.totalSeconds) + '</span></div></div>';
                grid.appendChild(a);
            }
        })().catch((e) => { $("loading").textContent = "Something went wrong."; console.error(e); });
    </script>
</body>
</html>
